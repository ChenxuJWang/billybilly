name: Expense Tracker CI

on:
  pull_request:
    paths:
      - 'expense-tracker/**'
      - '.github/workflows/expense-tracker-*.yml'
  push:
    branches:
      - main
    paths:
      - 'expense-tracker/**'
      - '.github/workflows/expense-tracker-*.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expense-tracker

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: expense-tracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
